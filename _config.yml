# --- Site ---
title: "Kairos"
tagline: "Tech · AI · Software"
description: >-
  Kairos — the personal blog of Nicolò Marana on technology, artificial
  intelligence and software development. Notes, experiments and analysis
  from the tech world.
author:
  name: "Nicolò Marana"
  email: "marana.nicolo@gmail.com"

# Public URL (GitHub Pages). Update if a custom domain is added.
url: "https://j4rv1scl4w-maker.github.io"
baseurl: "/kAIros"

lang: "en"
timezone: "Europe/Rome"

# --- Social / links (leave blank to hide) ---
# For LinkedIn use just the username from linkedin.com/in/USERNAME
social:
  github:
  linkedin: "nicolomarana"
  twitter:

# --- Build ---
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# --- Default front matter ---
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

# --- Exclusions ---
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - CONTRIBUTING.md
  - .github
