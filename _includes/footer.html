<footer class="site-footer">
  <div class="footer-inner">
    <span>© {{ site.time | date: "%Y" }} Nicolò Marana · Kairos</span>
    <span class="footer-links">
      {% if site.social.github %}<a href="https://github.com/{{ site.social.github }}" rel="me noopener" target="_blank">GitHub</a>{% endif %}
      {% if site.social.linkedin %}<a href="https://www.linkedin.com/in/{{ site.social.linkedin }}" rel="me noopener" target="_blank">LinkedIn</a>{% endif %}
      {% if site.social.twitter %}<a href="https://twitter.com/{{ site.social.twitter }}" rel="me noopener" target="_blank">X</a>{% endif %}
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </span>
  </div>
</footer>
